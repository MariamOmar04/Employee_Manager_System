<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>StaffHub — Mes Réunions</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-box">S</div>
      <div><div class="logo-name">StaffHub</div><div class="logo-sub">Espace Employé</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">MON ESPACE</div>
      <button class="nav-btn" onclick="location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Tableau de Bord</button>
      <button class="nav-btn" onclick="location.href='presence.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Ma Présence</button>
      <button class="nav-btn" onclick="location.href='leave.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Mes Congés</button>
      <button class="nav-btn" onclick="location.href='salary.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Mon Salaire</button>
      <button class="nav-btn active" onclick="location.href='meetings.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Mes Réunions</button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Déconnexion</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="topbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Rechercher...">
      </div>
      <div class="topbar-right">
        <div class="user-info">
          <div class="avatar" id="userAvatar">SJ</div>
          <div><div class="user-name" id="userName">—</div><div class="user-role" id="userPos">—</div></div>
        </div>
      </div>
    </header>

    <div class="pages">
      <div class="page active">

        <div class="page-header">
          <div>
            <h1>Mes Réunions</h1>
            <p>Réunions planifiées vous concernant</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
          <div class="stat-card">
            <div><div class="stat-label">Total</div><div class="stat-val" id="s-total">—</div></div>
            <div class="stat-icon icon-blue">📅</div>
          </div>
          <div class="stat-card">
            <div><div class="stat-label">À Venir</div><div class="stat-val" id="s-upcoming" style="color:var(--green)">—</div></div>
            <div class="stat-icon icon-green">⏳</div>
          </div>
          <div class="stat-card">
            <div><div class="stat-label">Passées</div><div class="stat-val" id="s-past" style="color:var(--text-sub)">—</div></div>
            <div class="stat-icon icon-orange">✅</div>
          </div>
        </div>

        <!-- Prochaine réunion mise en avant -->
        <div id="nextMeetingBanner"></div>

        <!-- Grille toutes les réunions -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-top:18px" id="meetingsGrid"></div>

      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<script>
const user = JSON.parse(sessionStorage.getItem('user') || '{}')
if (!user.employeeId) location.href = '../shared/login.html'

document.getElementById('userName').textContent   = user.firstName + ' ' + user.lastName
document.getElementById('userAvatar').textContent = (user.firstName?.[0]||'') + (user.lastName?.[0]||'')
document.getElementById('userPos').textContent    = user.position || ''

function logout () { sessionStorage.clear(); location.href = '../shared/login.html' }

function fmtDateFull (d) {
  if (!d) return '—'
  return new Date(d).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
}
function fmtDateShort (d) {
  if (!d) return '—'
  return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})
}

function isUpcoming (dateStr) {
  return new Date(dateStr) >= new Date(new Date().toDateString())
}

async function loadMeetings () {
  const meetings = await window.api.getMyMeetings(user.employeeId)
  const today    = new Date().toDateString()
  const upcoming = meetings.filter(m => new Date(m.meetingDate) >= new Date(today))
  const past     = meetings.filter(m => new Date(m.meetingDate) < new Date(today))

  document.getElementById('s-total').textContent    = meetings.length
  document.getElementById('s-upcoming').textContent = upcoming.length
  document.getElementById('s-past').textContent     = past.length

  // Prochaine réunion banner
  const bannerEl = document.getElementById('nextMeetingBanner')
  if (upcoming.length) {
    const next = upcoming[0]
    const participants = next.participants ? next.participants.split(',').map(p=>p.trim()) : []
    bannerEl.innerHTML = `
      <div style="background:linear-gradient(135deg,#1e5fba,#3b82f6);border-radius:var(--radius);padding:28px;color:#fff;margin-bottom:18px">
        <div style="font-size:12px;opacity:.7;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">🔔 Prochaine Réunion</div>
        <div style="font-size:22px;font-weight:800;margin-bottom:8px">${next.title}</div>
        <div style="opacity:.85;font-size:14px;margin-bottom:16px">${next.objective||'—'}</div>
        <div style="display:flex;gap:24px;flex-wrap:wrap;font-size:14px">
          <div>📅 <strong>${fmtDateFull(next.meetingDate)}</strong></div>
          <div>⏰ <strong>${next.startTime}</strong> · ${next.duration} min</div>
          ${next.location ? `<div>📍 <strong>${next.location}</strong></div>` : ''}
          <div>👥 <strong>${participants.length} participant(s)</strong></div>
        </div>
      </div>
    `
  } else {
    bannerEl.innerHTML = ''
  }

  // Grille
  const el = document.getElementById('meetingsGrid')
  if (!meetings.length) {
    el.innerHTML = '<div class="empty">Aucune réunion vous concernant.</div>'
    return
  }

  el.innerHTML = meetings.map(m => {
    const up = isUpcoming(m.meetingDate)
    const participants = m.participants ? m.participants.split(',').map(p=>p.trim()) : []
    return `
      <div class="meeting-card" style="border-left-color:${up ? 'var(--primary)' : '#cbd5e1'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div class="meeting-title">${m.title}</div>
          ${up
            ? '<span class="badge badge-active">À venir</span>'
            : '<span class="badge" style="background:var(--bg);color:var(--text-sub)">Terminée</span>'
          }
        </div>
        <div class="meeting-obj">${m.objective || '—'}</div>
        <div class="meeting-meta">
          <div class="meeting-meta-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${fmtDateFull(m.meetingDate)}
          </div>
          <div class="meeting-meta-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${m.startTime} — <strong>${m.duration} min</strong>
          </div>
          ${m.location ? `
          <div class="meeting-meta-row">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${m.location}
          </div>` : ''}
        </div>
        ${participants.length ? `
        <div class="participants-row">
          <div class="p-label">Participants</div>
          <div class="p-chips">
            ${participants.map(p => `<span class="p-chip" style="${p===user.employeeId?'background:var(--green-lt);color:#059669':''}">${p}</span>`).join('')}
          </div>
        </div>` : ''}
      </div>
    `
  }).join('')
}

loadMeetings()
</script>
</body>
</html>
