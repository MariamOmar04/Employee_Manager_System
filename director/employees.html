<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>StaffHub — Employés</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
<div class="app-layout">

  <!-- ═══ SIDEBAR ════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-box">S</div>
      <div>
        <div class="logo-name">StaffHub</div>
        <div class="logo-sub">Employee Manager</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">MENU</div>
      <button class="nav-btn" onclick="location.href='dashboard.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chart-no-axes-combined-icon lucide-chart-no-axes-combined"><path d="M12 16v5"/><path d="M16 14v7"/><path d="M20 10v11"/><path d="m22 3-8.646 8.646a.5.5 0 0 1-.708 0L9.354 8.354a.5.5 0 0 0-.707 0L2 15"/><path d="M4 18v3"/><path d="M8 14v7"/></svg>
        Dashboard
      </button>
      <button class="nav-btn active" onclick="location.href='employees.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Employés
      </button>
      <button class="nav-btn" onclick="location.href='attendance.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Présences
      </button>
      <button class="nav-btn" onclick="location.href='leaves.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Congés
      </button>
      <button class="nav-btn" onclick="location.href='meetings.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Réunions
      </button>
      <button class="nav-btn" onclick="location.href='reports.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Rapports 
      </button>
    </nav>
    <div class="sidebar-footer"><button class="nav-btn" onclick="location.href='profile.html'">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-user-round-icon lucide-circle-user-round"><path d="M17.925 20.056a6 6 0 0 0-11.851.001"/><circle cx="12" cy="11" r="4"/><circle cx="12" cy="12" r="10"/></svg>
     Profile </button></div>
    <div class="sidebar-footer">
      <button class="nav-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- ═══ MAIN ════════════════════════════════════════════════ -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Rechercher par nom, poste..." oninput="filterList()">
      </div>
      <div class="topbar-right">
        <div class="user-info">
          <div class="avatar" id="userAvatar">JD</div>
          <div>
            <div class="user-name" id="userName">—</div>
            <div class="user-role">Directeur</div>
          </div>
        </div>
      </div>
    </header>

    <div class="pages">
      <div class="page active">

        <div class="page-header">
          <div>
            <h1>Employés</h1>
            <p id="empCount">— membres de l'équipe</p>
          </div>
          <button class="btn btn-primary" onclick="openModal()">+ Ajouter Employé</button>
        </div>

        <!-- Filtres -->
        <div class="filter-bar">
          <div class="search-input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput2" placeholder="Rechercher..." oninput="filterList()">
          </div>
          <div class="chips" id="deptChips">
            <button class="chip active" onclick="setDept('all',this)">Tous</button>
          </div>
        </div>

        <!-- Grille employés -->
        <div class="emp-grid" id="empGrid"></div>

      </div>
    </div>
  </div>
</div>

<!-- ═══ MODAL AJOUTER / MODIFIER ═══════════════════════════ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Ajouter un Employé</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Prénom *</label>
          <input id="f-firstName" placeholder="Jean">
        </div>
        <div class="form-group">
          <label>Nom *</label>
          <input id="f-lastName" placeholder="Dupont">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>ID Employé *</label>
          <input id="f-id" placeholder="EMP-009">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="f-email" placeholder="jean.d@company.com">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Téléphone</label>
          <input id="f-phone" placeholder="+33 6 00 00 00 00">
        </div>
        <div class="form-group">
          <label>Date d'entrée</label>
          <input type="date" id="f-joinDate">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Département *</label>
          <select id="f-dept">
            <option>Engineering</option>
            <option>Design</option>
            <option>Marketing</option>
            <option>Human Resources</option>
            <option>Analytics</option>
            <option>Finance</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Poste *</label>
          <input id="f-position" placeholder="Développeur Frontend">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Salaire annuel (€)</label>
          <input type="number" id="f-salary" placeholder="60000">
        </div>
        <div class="form-group">
          <label>Prime annuelle (€)</label>
          <input type="number" id="f-bonus" placeholder="5000">
        </div>
      </div>
      <div class="form-group">
        <label>Statut</label>
        <select id="f-status">
          <option>Active</option>
          <option>On Leave</option>
          <option>Remote</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveEmployee()">Ajouter</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Variables globales ───────────────────────────────────────
const user = JSON.parse(sessionStorage.getItem('user') || '{}')
let allEmployees = []     // tous les employés chargés
let editingId    = null   // l'ID en cours de modification (null = ajout)
let currentDept  = 'all'

// ── Utilisateur ──────────────────────────────────────────────
document.getElementById('userName').textContent   = user.firstName + ' ' + user.lastName
document.getElementById('userAvatar').textContent = (user.firstName?.[0]||'') + (user.lastName?.[0]||'')

function logout () { sessionStorage.clear(); location.href = '../shared/login.html' }

// ── Toast ────────────────────────────────────────────────────
function toast (msg, type = 'info') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'show-' + type
  setTimeout(() => el.className = '', 3200)
}

// ── Badge statut ─────────────────────────────────────────────
function badge (s) {
  const m = { Active:'badge-active', 'On Leave':'badge-leave', Remote:'badge-remote' }
  return `<span class="badge ${m[s]||''}">${s}</span>`
}

// ── Formater date ────────────────────────────────────────────
function fmtDate (d) {
  if (!d) return '—'
  return new Date(d).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' })
}

// ── Charger tous les employés ────────────────────────────────
async function loadEmployees () {
  allEmployees = await window.api.getEmployees()
  document.getElementById('empCount').textContent = `${allEmployees.length} membres de l'équipe`

  // Construire les chips de département
  const depts = [...new Set(allEmployees.map(e => e.department))]
  const chipsEl = document.getElementById('deptChips')
  chipsEl.innerHTML = `<button class="chip active" onclick="setDept('all',this)">Tous</button>` +
    depts.map(d => `<button class="chip" onclick="setDept('${d}',this)">${d}</button>`).join('')

  renderGrid(allEmployees)
}

// ── Filtrer par département + recherche ──────────────────────
function setDept (dept, btn) {
  currentDept = dept
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'))
  btn.classList.add('active')
  filterList()
}

function filterList () {
  const q = (document.getElementById('searchInput2').value || '').toLowerCase()
  let list = allEmployees
  if (currentDept !== 'all') list = list.filter(e => e.department === currentDept)
  if (q) list = list.filter(e =>
    (e.firstName + ' ' + e.lastName).toLowerCase().includes(q) ||
    e.position.toLowerCase().includes(q) ||
    e.email.toLowerCase().includes(q)
  )
  renderGrid(list)
}

// ── Afficher la grille ───────────────────────────────────────
function renderGrid (list) {
  const el = document.getElementById('empGrid')
  if (!list.length) {
    el.innerHTML = '<div class="empty">Aucun employé trouvé.</div>'
    return
  }
  el.innerHTML = list.map(e => `
    <div class="emp-card">
      <div class="emp-card-top">
        <div class="emp-card-info">
          <div class="avatar">${e.firstName[0]}${e.lastName[0]}</div>
          <div>
            <div class="emp-name">${e.firstName} ${e.lastName}</div>
            <div class="emp-pos">${e.position}</div>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="icon-btn" title="Modifier" onclick="openEdit('${e.employeeId}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="icon-btn" title="Supprimer" style="color:var(--red)" onclick="deleteEmp('${e.employeeId}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>

      <div class="emp-meta">
        <div class="emp-meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          ${e.email}
        </div>
        <div class="emp-meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.23h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.1a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z"/></svg>
          ${e.phone || '—'}
        </div>
        <div class="emp-meta-row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          ${e.department}
        </div>
      </div>

      <div class="emp-card-foot">
        ${badge(e.status)}
        <span style="font-size:12px;color:var(--text-sub)">Depuis ${fmtDate(e.joinDate)}</span>
      </div>
    </div>
  `).join('')
}

// ── Ouvrir modal ajout ───────────────────────────────────────
function openModal () {
  editingId = null
  document.getElementById('modalTitle').textContent = 'Ajouter un Employé'
  document.getElementById('saveBtn').textContent    = 'Ajouter'
  // Vider le formulaire
  ;['f-firstName','f-lastName','f-id','f-email','f-phone','f-position','f-salary','f-bonus']
    .forEach(id => document.getElementById(id).value = '')
  document.getElementById('f-joinDate').value = new Date().toISOString().split('T')[0]
  document.getElementById('f-dept').value   = 'Engineering'
  document.getElementById('f-status').value = 'Active'
  document.getElementById('modal').classList.add('open')
}

// ── Ouvrir modal modification ────────────────────────────────
function openEdit (empId) {
  const e = allEmployees.find(x => x.employeeId === empId)
  if (!e) return
  editingId = empId
  document.getElementById('modalTitle').textContent = 'Modifier Employé'
  document.getElementById('saveBtn').textContent    = 'Enregistrer'
  document.getElementById('f-firstName').value = e.firstName
  document.getElementById('f-lastName').value  = e.lastName
  document.getElementById('f-id').value        = e.employeeId
  document.getElementById('f-id').disabled     = true   // on ne change pas l'ID
  document.getElementById('f-email').value     = e.email
  document.getElementById('f-phone').value     = e.phone || ''
  document.getElementById('f-joinDate').value  = e.joinDate || ''
  document.getElementById('f-dept').value      = e.department
  document.getElementById('f-position').value  = e.position
  document.getElementById('f-salary').value    = e.salary
  document.getElementById('f-bonus').value     = e.bonus
  document.getElementById('f-status').value    = e.status
  document.getElementById('modal').classList.add('open')
}

function closeModal () {
  document.getElementById('modal').classList.remove('open')
  document.getElementById('f-id').disabled = false
}

// ── Sauvegarder (ajout ou modif) ─────────────────────────────
async function saveEmployee () {
  const data = {
    employeeId : document.getElementById('f-id').value.trim().toUpperCase(),
    firstName  : document.getElementById('f-firstName').value.trim(),
    lastName   : document.getElementById('f-lastName').value.trim(),
    email      : document.getElementById('f-email').value.trim(),
    phone      : document.getElementById('f-phone').value.trim(),
    joinDate   : document.getElementById('f-joinDate').value,
    department : document.getElementById('f-dept').value,
    position   : document.getElementById('f-position').value.trim(),
    salary     : parseFloat(document.getElementById('f-salary').value) || 0,
    bonus      : parseFloat(document.getElementById('f-bonus').value) || 0,
    status     : document.getElementById('f-status').value,
  }

  // Validation simple
  if (!data.firstName || !data.lastName || !data.email || !data.employeeId || !data.position) {
    toast('Veuillez remplir tous les champs obligatoires (*)', 'error')
    return
  }

  let res
  if (editingId) {
    res = await window.api.updateEmployee(data)
  } else {
    res = await window.api.addEmployee(data)
  }

  if (res.ok) {
    closeModal()
    toast(editingId ? 'Employé modifié ✓' : 'Employé ajouté ✓', 'success')
    loadEmployees()
  } else {
    toast('Erreur : ' + res.message, 'error')
  }
}

// ── Supprimer un employé ─────────────────────────────────────
async function deleteEmp (empId) {
  if (!confirm('Supprimer cet employé ? Cette action est irréversible.')) return
  const res = await window.api.deleteEmployee(empId)
  if (res.ok) {
    toast('Employé supprimé.', 'success')
    loadEmployees()
  } else {
    toast('Erreur : ' + res.message, 'error')
  }
}

// ── Démarrer ─────────────────────────────────────────────────
loadEmployees()
</script>
</body>
</html>
